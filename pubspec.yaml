name: smart_expense_tracker
description: Smart Expense Tracker App with OCR, Charts, PDF & Excel Export
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Charts
  fl_chart: ^0.68.0

  # OCR
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7

  # Export
  pdf: ^3.10.7
  excel: ^4.0.2
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive code generation
  build_runner: ^2.5.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true